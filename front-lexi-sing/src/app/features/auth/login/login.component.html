<div class="auth-container">
  <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
    <h2>Iniciar sesión</h2>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Correo electrónico</mat-label>
      <input matInput formControlName="email" type="email" autocomplete="email" />
      <mat-error *ngIf="email?.hasError('required')">El correo es obligatorio</mat-error>
      <mat-error *ngIf="email?.hasError('email')">Formato de correo inválido</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Contraseña</mat-label>
      <input matInput formControlName="password" type="password" autocomplete="current-password" />
      <mat-error *ngIf="password?.hasError('required')">La contraseña es obligatoria</mat-error>
    </mat-form-field>

    <div class="actions">
      <button mat-flat-button color="primary" type="submit" [disabled]="loading">Iniciar sesión</button>
    </div>

    <div class="social">
    </div>

    <div class="error" *ngIf="error">{{ error }}</div>

    <p class="links">¿No tienes una cuenta? <a routerLink="/register">Regístrate</a></p>
  </form>
</div>
