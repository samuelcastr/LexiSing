<div class="conv-list">
  <h3>Tus conversaciones</h3>
  <mat-list>
    <mat-list-item *ngFor="let c of conversations">
      <a [routerLink]="['/chat', c.id]">{{ c.lastMessage || 'Nueva conversación' }}</a>
    </mat-list-item>
  </mat-list>
  <div class="actions">
    <button mat-stroked-button routerLink="/dashboard">Volver</button>
  </div>
</div>
